apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloud-task-orchestrator
  labels:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloud-task-orchestrator
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloud-task-orchestrator
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: cloud-task-orchestrator-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5173
          env:
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: cloud-task-config
                  key: VITE_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 25
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloud-task-orchestrator
  labels:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 5173
      targetPort: http
