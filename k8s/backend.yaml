apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloud-task-orchestrator
  labels:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloud-task-orchestrator
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloud-task-orchestrator
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: cloud-task-orchestrator-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: cloud-task-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: cloud-task-config
                  key: REDIS_PORT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: cloud-task-config
                  key: CORS_ORIGINS
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 8
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cloud-task-orchestrator
  labels:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: cloud-task-orchestrator
    app.kubernetes.io/component: backend
  ports:
    - name: http
      port: 8000
      targetPort: http
